<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WT Politika | Független Hírportál és Felmérés</title>
    
    <!-- MONETAG HIRDETÉSI KÓD -->
    <script src="https://5gvci.com/act/files/tag.min.js?z=11158750" data-cfasync="false" async></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- FELSŐ NAVIGÁCIÓS MENÜ -->
    <nav class="navbar">
        <div class="nav-left" onclick="showMainPage()" style="cursor: pointer;">
            <span class="logo-bracket">[</span>
            <span class="logo-text">WT Politika</span>
            <span class="logo-bracket">]</span>
        </div>
        <div class="nav-center">
            <button id="nav-main" class="nav-btn active" onclick="showMainPage()">Főoldal & Napi Hírek</button>
            <button id="nav-partok" class="nav-btn" onclick="openPartNews()">Pártok Hírei & Info</button>
        </div>
        <div class="nav-right">
            <a href="https://discord.gg/AHx7F9ytWe" target="_blank" class="dc-btn" style="padding: 8px 15px; font-size: 14px;">Discord Politikai Chat</a>
        </div>
    </nav>

    <!-- FŐOLDAL: NAPI 5 HÍR ÉS A TOP 10 PÁRT SZAVAZÁS -->
    <div id="main-page" class="container">
        
        <div class="politics-grid" style="display: flex; gap: 30px; flex-wrap: wrap; margin-top: 20px;">
            
            <!-- BAL OLDAL: NAPI 5 RÖVID HÍR -->
            <div class="news-feed" style="flex: 1; min-width: 300px;">
                <h2 style="color: #45f3ff; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px;">📌 Napi Friss Hírek</h2>
                <div id="daily-news-container">
                    <!-- Ide a JS pakolja be az 5 hírt -->
                </div>
            </div>

            <!-- JOBB OLDAL: TOP 10 PÁRT INTERAKTÍV SZAVAZÁS -->
            <div class="poll-section" style="flex: 1; min-width: 350px; background: #151a22; padding: 25px; border-radius: 12px; border: 1px solid #333; height: fit-content;">
                <h2 style="color: #ff9900; margin-top: 0;">📊 Országos Népszerűségi Felmérés</h2>
                <p style="color: #8f9aa7; font-size: 14px; margin-bottom: 20px;">Add le a voksodat! Szerinted melyik párt nyerné a választásokat most vasárnap? (A szavazás anonim)</p>
                
                <div id="poll-container">
                    <!-- Ide jön a 10 párt a szavazósávokkal -->
                </div>
                <p style="font-size: 11px; color: #555; text-align: center; margin-top: 15px;">A szavazatokat a böngésződ megjegyzi.</p>
            </div>

        </div>
    </div>

    <!-- PÁRTOK SZERINTI HÍREK ÉS CIKKEK INTERFÉSZ -->
    <div id="learning-page" class="learning-container" style="display: none;">
        <aside id="lecture-menu" class="sidebar">
            <!-- Ide jön a 10 Párt listája mint menü -->
        </aside>
        
        <main class="content-area" style="width: 100%;">
            <div id="lecture-text" class="lecture-markdown" style="max-width: 800px; margin: 0 auto; padding: 20px;">
                <!-- Ide töltődnek be a pártokról szóló egyedi cikkek -->
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
